model:
  name: null
  embedding_dim: 512
  input_size: 112

loss:
  name: arcface
  margin: 0.5
  scale: 64
  margin_warmup_epochs: 5

train:
  epochs: 25
  batch_size: 256
  num_workers: 8
  mixed_precision: true
  grad_clip: 5.0
  seed: 42

  optimizer:
    type: sgd
    lr: 0.1
    momentum: 0.9
    weight_decay: 5.0e-4

  scheduler:
    type: multistep
    milestones: [10, 16, 22]
    gamma: 0.1
    warmup_epochs: 2

data:
  dataset: ms1mv3
  root: data/ms1mv3
  num_classes: null
  num_images: null

eval:
  benchmarks:
    - lfw
    - cplfw
    - calfw
    - agedb_30
    - cfp_fp
  eval_root: data/eval

save:
  output_dir: results/
  save_best: true
  save_last: true
  log_interval: 100
